<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Especiales - Nova</title>
    <link rel="stylesheet" href="../Esteticos/estilos_dashboard.css">
    <link rel="stylesheet" href="../ventas/ventas.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        .dashboard-container { display: flex; min-height: 100vh; }
        .main-content { margin-left: 16.5%; width: calc(100% - 280px); padding: 40px; background-color: #f9f9f9; display: flex; justify-content: center; }
        .pedido-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; height: 100%;}
        
        .btn-logout {
    width: 100%;
    background-color: #ffffff;
    border: 1px solid #ebd0d8;
    padding: 15px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: background-color 0.2s;
}

.btn-logout:hover {
    background-color: #fdf5f7;
}

        /* Botón Salir Centrado */
  
        .input-underline { border: none; border-bottom: 2px solid #fce4ec; outline: none; padding: 5px; width: 150px; font-size: 16px; }
        .tabla-productos { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .tabla-productos th { background: #fce4ec; padding: 12px; text-align: left; }
        .tabla-productos td { padding: 10px; border-bottom: 1px solid #eee; }
        .input-tabla { width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        
        .btn-add { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: 600; }
        .btn-guardar { background: #3498db; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 25px; font-size: 16px; }
        .oculto { display: none !important; }

        /* Estilo Recibo */
        .recibo-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .recibo-tabla { width: 100%; border-collapse: collapse; margin: 20px 0; border: 1px solid #333; }
        .recibo-tabla th { background: #fce4ec; border: 1px solid #333; padding: 12px; font-weight: bold; }
        .recibo-tabla td { border: 1px solid #333; padding: 12px; text-align: center; }
        .totales-recibo { background: #fce4ec; padding: 15px; border-radius: 8px; min-width: 150px; text-align: center; }
    </style>
</head>
<body>
    <div class="dashboard-container">  
        <aside class="sidebar" style="display: flex; flex-direction: column; height: 100vh; position: fixed;">     
            <div class="logo-container"><img src="../Esteticos/logo.png" alt="Nova"></div>
            <div class="user-profile">
                <div class="avatar">A</div>
                <div class="user-info"><p class="user-name">Admin</p><p class="user-role">SUPERADMIN</p></div>
            </div>
            <nav class="nav-menu">
                <a href="../ventas/Ventas.html" class="nav-item">💰 Ventas</a>
                <a href="#" class="nav-item">📦 Inventarios</a>
                <a href="../Emprendedores/Emprendedores.html" class="nav-item">🚀 Emprendedores</a>
                <a href="../Usuario/Usuarios.html" class="nav-item">👤 Usuarios</a>
                <a href="Pedidos_especiales.html" class="nav-item active">📋 Pedidos especiales</a>
            </nav>
            <div class="logout-container">
                <a href="../index.html" class="btn-logout"><span>🚪 Salir</span></a>
            </div>
        </aside>

        <main class="main-content">
            <div id="vista-formulario" class="pedido-card">
                <h1 style="font-family: serif; letter-spacing: 3px; border-left: 5px solid #fce4ec; padding-left: 15px;">NUEVO PEDIDO</h1>
                <div style="display: flex; gap: 40px; margin: 25px 0;">
                    <p><strong>NO:</strong> <input type="text" id="in-no" class="input-underline" value="001"></p>
                    <p><strong>FECHA:</strong> <input type="date" id="in-fecha" class="input-underline"></p>
                </div>

                <table class="tabla-productos" id="tabla-pedidos">
                    <thead>
                        <tr><th>PRODUCTO</th><th width="80">CANT</th><th width="120">PRECIO U.</th><th width="50"></th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" class="input-tabla p-nom" placeholder="¿Qué se pidió?"></td>
                            <td><input type="number" class="input-tabla p-cant" value="1" oninput="calcularTotal()"></td>
                            <td><input type="number" class="input-tabla p-prec" placeholder="0.00" oninput="calcularTotal()"></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
                <button class="btn-add" onclick="agregarFila()">+ Añadir otro producto</button>

                <div style="display: flex; gap: 20px; margin-top: 35px; align-items: flex-start;">
                    <div style="flex:2;">
                        <label><strong>NOTAS DE DISEÑO O ENTREGA:</strong></label>
                        <textarea id="in-notas" rows="4" style="width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-top: 10px; outline: none;"></textarea>
                    </div>
                    <div style="flex:1; background:#fce4ec; margin-top: 35px; padding:25px; border-radius: 20px; text-align:center; box-shadow: inset 0 0 10px rgba(0,0,0,0.02);">
                        <span style="font-size:14px; font-weight: bold; color: #888;">TOTAL ESTIMADO</span><br>
                        <strong id="display-total" style="font-size:32px; color: #333;">$0.00</strong>
                    </div>
                </div>
                <button class="btn-guardar" onclick="generarVistaPrevia()">💾 GUARDAR Y GENERAR RECIBO</button>
            </div>

            <div id="vista-previa" class="pedido-card oculto">
                <div class="recibo-header">
                    <div>
                        <h1 style="font-size: 45px; margin:0; font-family: serif;">PEDIDO</h1>
                        <p style="margin: 5px 0;"><strong>FOLIO:</strong> <span id="pre-no"></span></p>
                        <p style="margin: 5px 0;"><strong>FECHA:</strong> <span id="pre-fecha"></span></p>
                    </div>
                    <img src="../Esteticos/logo.png" width="160">
                </div>
                
                <table class="recibo-tabla">
                    <thead>
                        <tr><th>PRODUCTO</th><th>CANT</th><th>PRECIO U.</th><th>SUBTOTAL</th></tr>
                    </thead>
                    <tbody id="recibo-cuerpo"></tbody>
                </table>

                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-top: 20px;">
                    <div style="border: 1px solid #333; padding:15px; width: 55%; border-radius:5px; min-height: 80px;">
                        <strong>NOTAS:</strong><br><span id="pre-notas" style="white-space: pre-wrap;"></span>
                    </div>
                    <div class="totales-recibo">
                        <span style="font-size: 14px;">TOTAL FINAL</span><br>
                        <strong id="pre-total" style="font-size: 28px;"></strong>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 40px;">
                    <button class="btn-guardar" style="background:#7f8c8d; margin:0;" onclick="regresar()">✏️ CORREGIR</button>
                    <button class="btn-guardar" style="background:#2ecc71; margin:0;" onclick="window.print()">🖨️ IMPRIMIR RECIBO</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function agregarFila() {
            const tbody = document.querySelector("#tabla-pedidos tbody");
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td><input type="text" class="input-tabla p-nom"></td>
                <td><input type="number" class="input-tabla p-cant" value="1" oninput="calcularTotal()"></td>
                <td><input type="number" class="input-tabla p-prec" oninput="calcularTotal()"></td>
                <td><button onclick="this.parentElement.parentElement.remove(); calcularTotal()" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-weight:bold;">✕</button></td>
            `;
            tbody.appendChild(fila);
        }

        function calcularTotal() {
            let totalGeneral = 0;
            document.querySelectorAll("#tabla-pedidos tbody tr").forEach(fila => {
                const cant = parseFloat(fila.querySelector(".p-cant").value) || 0;
                const prec = parseFloat(fila.querySelector(".p-prec").value) || 0;
                totalGeneral += (cant * prec);
            });
            document.getElementById("display-total").textContent = "$" + totalGeneral.toFixed(2);
        }

        function generarVistaPrevia() {
            // Datos básicos
            document.getElementById("pre-no").textContent = document.getElementById("in-no").value;
            document.getElementById("pre-fecha").textContent = document.getElementById("in-fecha").value;
            document.getElementById("pre-notas").textContent = document.getElementById("in-notas").value;
            document.getElementById("pre-total").textContent = document.getElementById("display-total").textContent;

            // Tabla de productos en el recibo
            const cuerpo = document.getElementById("recibo-cuerpo");
            cuerpo.innerHTML = "";
            
            document.querySelectorAll("#tabla-pedidos tbody tr").forEach(fila => {
                const nom = fila.querySelector(".p-nom").value;
                const cant = parseFloat(fila.querySelector(".p-cant").value) || 0;
                const prec = parseFloat(fila.querySelector(".p-prec").value) || 0;
                const sub = cant * prec;

                if(nom.trim() !== "") {
                    const rFila = `
                        <tr>
                            <td style="text-align: left;">${nom}</td>
                            <td>${cant}</td>
                            <td>$${prec.toFixed(2)}</td>
                            <td style="font-weight: bold;">$${sub.toFixed(2)}</td>
                        </tr>`;
                    cuerpo.innerHTML += rFila;
                }
            });

            document.getElementById("vista-formulario").classList.add("oculto");
            document.getElementById("vista-previa").classList.remove("oculto");
        }

        function regresar() {
            document.getElementById("vista-formulario").classList.remove("oculto");
            document.getElementById("vista-previa").classList.add("oculto");
        }
    </script>
</body>
</html>
