<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Concept Store</title>
    <link rel="stylesheet" href="Esteticos/estilos.css">
</head>
<body>

<div class="login-container">
    <div class="logo-container">
        <img src="./Esteticos/logo.png" alt="Logo Nova Concept Store">
    </div>
    <h2>Ingrese usuario y contraseña</h2>
    <div class="form-group">
        <input type="text" id="usuario" placeholder="Usuario" required>
    </div>
    <div class="form-group">
        <input type="password" id="contrasena" placeholder="Contraseña" required>
    </div>
    <button id="submitBtn">Entrar</button>
    <p id="message"></p>
</div>

<script src="Login/boton_entrar.js"></script>
</body>
</html>
